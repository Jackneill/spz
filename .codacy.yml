---
exclude_paths:
  - ".claude/**"
  - ".config/**"
  - ".cargo/**"
  - ".github/**"
  - ".vscode/**"

  - "assets/**"
  - "book/**"
  - "capnproto/**"
  - "docs/**"
  - "flatpak/**"
  - "fuzz/**"
  - "snap/**"
  - "target/**"

  - "**/*.md"
  - "**/*.toml"
  - "**/*.yml"
  - "**/*.yaml"
  - "**/*.txt"

  - "LICENSE-APACHE"
  - "LICENSE-MIT"
