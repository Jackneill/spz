      - "crates/**/examples/**"
      - "crates/**/benches/**"
      - "crates/**/tests/**"

      - "crates/spz-binding-python/pypkg/tests/**"
      - "crates/spz-binding-python/dev/**"

  metric:
    exclude_paths:
      - "crates/**/examples/**"
      - "crates/**/benches/**"
      - "crates/**/tests/**"

      - "crates/spz-binding-python/pypkg/tests/**"
      - "crates/spz-binding-python/dev/**"
